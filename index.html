<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Team Links Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="theme.js"></script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Business dashboard</p>
          <h1 id="page-title">Team links</h1>
          <p class="intro">A quick-launch board for the services, documents, and tools your team uses every day.</p>
        </div>
        <div class="header-actions">
          <div class="status-panel" aria-label="Dashboard status">
            <span class="status-dot"></span>
            <span id="currentUser">Sign in required</span>
          </div>
          <div class="account-menu" id="accountMenu">
            <button class="account-button" id="accountButton" type="button" aria-expanded="false" aria-haspopup="true">
              <span id="accountInitials">U</span>
            </button>
            <div class="account-dropdown" id="accountDropdown" hidden>
              <p class="account-email" id="accountEmail">Signed in</p>
              <button class="dropdown-item" id="themeToggleButton" type="button">Dark mode</button>
              <a class="dropdown-item" href="admin.html">Admin panel</a>
              <button class="dropdown-item danger" id="signOutButton" type="button">Log out</button>
            </div>
          </div>
        </div>
      </section>

      <section class="auth-panel" id="authPanel" aria-labelledby="login-title">
        <form class="auth-form" id="authForm">
          <div class="panel-head compact">
            <div>
              <p class="eyebrow">Staff</p>
              <h2 id="login-title">Staff login</h2>
            </div>
          </div>
          <p>Sign in to access the dashboard.</p>
          <label>
            Email
            <input id="authEmail" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input id="authPassword" type="password" autocomplete="current-password" required>
          </label>
          <button class="primary-button" type="submit">Sign in</button>
          <p class="form-message" id="authMessage" hidden></p>
        </form>
      </section>

      <section id="dashboardContent" hidden>
        <div class="toolbar-line">
          <section class="controls" aria-label="Dashboard controls">
            <label class="search-wrap" for="searchInput">
              <span class="search-icon" aria-hidden="true">?</span>
              <input id="searchInput" type="search" placeholder="Search links, categories, or notes">
            </label>
            <div class="category-tabs" id="categoryTabs" aria-label="Filter categories"></div>
          </section>
          <div class="top-actions">
            <button class="ghost-button" id="backToFoldersButton" type="button" hidden>Folders</button>
          </div>
        </div>

        <section class="loading-state" id="loadingState" hidden>Loading links...</section>
        <section class="link-grid" id="linkGrid" aria-live="polite"></section>

        <section class="empty-state" id="emptyState" hidden>
          <h2>No matching links</h2>
          <p>Try a different search or category.</p>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
